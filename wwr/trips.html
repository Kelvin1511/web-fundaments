<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips - Rafting Adventures | Rich Kevin Panozo</title>
    <meta name="description" content="Explore our variety of rafting trips, from calm family floats to extreme whitewater challenges.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="trips-cta">
            <h1>Our River Adventures</h1>
            <p>Ready for the thrill? <a href="contact.html" class="btn">Contact Us to Book</a></p>
        </div>

        <section class="trips-grid">
            <figure class="trip-card">
                <img src="images/hero.jpg" alt="Rafting Trip 1">
                <figcaption>
                    <h2>Grand Canyon Adventure</h2>
                    <p>A 7-day world-class expedition through breathtaking canyons.</p>
                </figcaption>
            </figure>
            <figure class="trip-card">
                <img src="images/client.jpg" alt="Rafting Trip 2">
                <figcaption>
                    <h2>Salmon River Float</h2>
                    <p>Perfect for families who want a mix of relaxation and fun rapids.</p>
                </figcaption>
            </figure>
            <figure class="trip-card">
                <img src="images/hero.jpg" alt="Rafting Trip 3">
                <figcaption>
                    <h2>Snake River Sprint</h2>
                    <p>A high-intensity day trip for those seeking maximum adrenaline.</p>
                </figcaption>
            </figure>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Trip Name</th>
                        <th>Duration</th>
                        <th>Level</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Grand Canyon</td>
                        <td>7 Days</td>
                        <td>Advanced</td>
                    </tr>
                    <tr>
                        <td>Salmon River</td>
                        <td>3 Days</td>
                        <td>Intermediate</td>
                    </tr>
                    <tr>
                        <td>Snake River</td>
                        <td>1 Day</td>
                        <td>Expert</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>© 2026 Rafting Project | Rich Kevin Panozo Vargas | Bolivia</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </nav>
    </footer>
</body>
</html>
