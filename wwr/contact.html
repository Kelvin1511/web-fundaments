<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dry Water Rafting</title>
    <meta name="author" content="Rich Kevin Panozo Vargas">
    <meta name="description" content="Contact page for Dry Water Rafting adventures.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        <section>
            <p>Address: Av. Heroinas, Cochabamba, Bolivia</p>
            <iframe src="https://www.google.com/maps/embed?pb=1" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </section>

        <section>
            <form action="#" method="post">
                <label for="user_name">Name:</label>
                <input type="text" id="user_name" name="user_name" required>

                <label for="user_email">Email:</label>
                <input type="email" id="user_email" name="user_email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>

                <label for="subscribe">
                    <input type="checkbox" id="subscribe" name="subscribe"> Subscribe
                </label>

                <button type="submit">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Rich Kevin Panozo Vargas</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </nav>
    </footer>
</body>
</html>
