<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <meta name="description" content="Contact Whitewater Rafting for the best river adventures in Bolivia. Reach out for reservations or questions.">
    <meta name="author" content="Rich Kevin Panozo Vargas">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Visit Our Office</h1>
        <div class="contact-layout">
            <section class="business-info">
                <h2>Our Location</h2>
                <p>Address: Av. Heroínas, Cochabamba, Bolivia</p>
                <p>Email: info@raftingadventure.com</p>
                <p>Phone: +591 4 1234567</p>
                <div class="map-box">
                    <img src="images/map.png" alt="Map of our office location">
                </div>
            </section>

            <section class="form-wrapper">
                <h2>Message Us</h2>
                <form action="#" method="post">
                    <label for="user-name">Full Name</label>
                    <input type="text" id="user-name" name="user-name" required>

                    <label for="user-email">Email Address</label>
                    <input type="email" id="user-email" name="user-email" required>

                    <fieldset>
                        <legend>Purpose of Inquiry</legend>
                        <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
                        <label><input type="radio" name="purpose" value="reservation"> Reservation</label>
                        <label><input type="radio" name="purpose" value="feedback"> Feedback</label>
                    </fieldset>

                    <label for="user-message">Your Message</label>
                    <textarea id="user-message" name="user-message" rows="5" required></textarea>

                    <label class="check-container">
                        <input type="checkbox" name="subscribe" value="yes"> Please subscribe me to the newsletter
                    </label>

                    <button type="submit">Send Message</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Whitewater Rafting | Rich Kevin Panozo Vargas</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.png" alt="Instagram">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.png" alt="LinkedIn">
            </a>
        </nav>
    </footer>
</body>
</html>
