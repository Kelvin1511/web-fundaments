<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dry Water Rafting - Rich Kevin Panozo</title>
    <meta name="author" content="Rich Kevin Panozo Vargas">
    <meta name="description" content="Contact Dry Water Rafting for river adventures. Located in Cochabamba, Bolivia.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Dry Water Rafting</h1>
        
        <section class="contact-grid">
            <p>Address: Av. Heroínas, Cochabamba, Bolivia</p>
            <p>Phone: +591 70000000</p>
            <p>Email: info@drywaterrafting.com</p>
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="300"></iframe>
            </div>
        </section>

        <section class="employee-profiles">
            <h2>Our Expert Team</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/profile.jpg" alt="Rich Kevin Panozo">
                    <figcaption>Rich Kevin Panozo Vargas - Founder</figcaption>
                </figure>
                <figure>
                    <img src="images/client.jpg" alt="Sarah Johnson">
                    <figcaption>Sarah Johnson - Guide 1</figcaption>
                </figure>
                <figure>
                    <img src="images/hero.jpg" alt="Marco Polo">
                    <figcaption>Marco Polo - Guide 2</figcaption>
                </figure>
            </div>
        </section>

        <section class="form-section">
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="user_name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="user_email" required>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion</label>
                </fieldset>

                <label for="msg">Message:</label>
                <textarea id="msg" name="user_message"></textarea>

                <label for="newsletter">
                    <input type="checkbox" id="newsletter" name="subscribe"> Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Submit Adventure Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Rafting Project | Rich Kevin Panozo Vargas | Cochabamba, Bolivia</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </nav>
    </footer>
</body>
</html>
