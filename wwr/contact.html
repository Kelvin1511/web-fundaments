<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Whitewater Rafting Logo">
        <nav>
            <a href="../index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contact-container">
            <section class="office-info">
                <h1>Our Location</h1>
                <p><strong>Address:</strong> Av. Heroínas, Cochabamba, Bolivia</p>
                <p><strong>Email:</strong> team@rafting.com</p>
                <p><strong>Phone:</strong> +591 123 45678</p>
                <div class="map-box">
                    <img src="images/map.png" alt="Office Map">
                </div>
            </section>

            <section class="form-container">
                <h2>Send Us a Message</h2>
                <form>
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="full-name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>

                    <label>Purpose of Message</label>
                    <div style="margin-top: 10px;">
                        <input type="radio" id="general" name="purpose" value="general">
                        <label style="display: inline; font-weight: normal;" for="general">General</label>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label style="display: inline; font-weight: normal;" for="reservation">Reservation</label>
                    </div>

                    <label for="msg">Message</label>
                    <textarea id="msg" name="msg" rows="5"></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas</p>
        <div class="social-links">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.png" alt="Instagram">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.png" alt="LinkedIn">
            </a>
        </div>
    </footer>
</body>
</html>
