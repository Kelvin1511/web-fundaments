<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Logo">
        <nav>
            <a href="../index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="contact-header">
            <h1>Contact Us</h1>
            <p>Our team is here to help you plan your next adventure.</p>
        </section>

        <section class="contact-details">
            <div class="contact-info">
                <h2>Visit Our Office</h2>
                <p>Address: Av. Heroínas, Cochabamba, Bolivia</p>
                <p>Email: contact@raftingadventure.com</p>
                <p>Phone: +591 123 45678</p>
                <div class="map-container">
                    <img src="images/map.png" alt="Map Location in Cochabamba">
                </div>
            </div>

            <form class="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation</label>
                </fieldset>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4"></textarea>
                
                <button type="submit" class="submit-button">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas</p>
    </footer>
</body>
</html>
