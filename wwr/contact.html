<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dry Water Rafting - Rich Kevin Panozo</title>
    <meta name="author" content="Rich Kevin Panozo Vargas">
    <meta name="description" content="Contact Dry Water Rafting for the best river adventures. Reach out to Rich Kevin Panozo Vargas in Cochabamba, Bolivia.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Site Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        <section class="contact-info">
            <div class="info-box">
                <p><strong>Address:</strong> Heroinas Avenue, Cochabamba, Bolivia</p>
                <p><strong>Phone:</strong> +591 70000000</p>
                <p><strong>Email:</strong> info@drywaterrafting.com</p>
            </div>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15226.71441866!2d-66.1568!3d-17.3935!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x93e373f060!2sCochabamba%2C%20Bolivia!5e0!3m2!1sen!2sbo!4v1648000000000" width="100%" height="300" loading="lazy"></iframe>
            </div>
        </section>

        <section class="team-section">
            <h2>Our Expert Team</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/profile.jpg" alt="Rich Kevin Panozo">
                    <figcaption>Rich Kevin Panozo Vargas - CEO</figcaption>
                </figure>
                <figure>
                    <img src="images/client.jpg" alt="Sarah Johnson">
                    <figcaption>Sarah Johnson - Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/hero.jpg" alt="Marco Polo">
                    <figcaption>Marco Polo - Specialist</figcaption>
                </figure>
            </div>
        </section>

        <section class="form-container">
            <h2>Send a Message</h2>
            <form action="#" method="post">
                <div class="form-item">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="user_name" required>
                </div>
                <div class="form-item">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="user_email" required>
                </div>
                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion</label>
                </fieldset>
                <div class="form-item">
                    <label for="message">Message:</label>
                    <textarea id="message" name="user_message" rows="4"></textarea>
                </div>
                <div class="form-item">
                    <label for="newsletter">
                        <input type="checkbox" id="newsletter" name="subscribe"> Please subscribe me to the monthly newsletter
                    </label>
                </div>
                <button type="submit">Submit Adventure Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Rafting Project | Rich Kevin Panozo Vargas | Cochabamba, Bolivia</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="https://linkedin.com" target="_blank"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </nav>
    </footer>
</body>
</html>
