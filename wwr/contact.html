<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="../index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contact-container">
            <section class="contact-info">
                <h1>Visit Our Office</h1>
                <p><strong>Address:</strong> Av. Heroínas, Cochabamba, Bolivia</p>
                <p><strong>Email:</strong> contact@raftingadventure.com</p>
                <p><strong>Phone:</strong> +591 123 45678</p>
                <div class="map-container">
                    <img src="images/map.png" alt="Our Location">
                </div>
            </section>

            <section class="contact-form">
                <h2>Send Us a Message</h2>
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" style="width:100%; padding:8px; margin-bottom:15px;">

                    <label for="email">Email</label>
                    <input type="email" id="email" style="width:100%; padding:8px; margin-bottom:15px;">

                    <label for="message">Message</label>
                    <textarea id="message" rows="5" style="width:100%; padding:8px;"></textarea>

                    <button type="submit" style="background:#004e92; color:white; border:none; padding:10px 20px; margin-top:15px; cursor:pointer;">Send Message</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas</p>
        <div class="social-links">
            <a href="https://facebook.com" target="_blank"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="https://linkedin.com" target="_blank"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </div>
    </footer>
</body>
</html>
