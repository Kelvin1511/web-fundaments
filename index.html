<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Whitewater Rafting</title>
    <meta name="description" content="Discover the thrill of whitewater rafting in Bolivia. Join us for a journey of adventure and nature.">
    <meta name="author" content="Rich Kevin Panozo Vargas">
    <link rel="stylesheet" href="wwr/styles/rafting.css">
</head>
<body>
    <header>
        <img src="wwr/images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="wwr/about.html">About Us</a>
            <a href="wwr/trips.html">Trips</a>
            <a href="wwr/contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="wwr/images/hero.jpg" alt="Rafting Hero">
            <a href="wwr/trips.html" class="hero-btn">View Our Trips</a>
        </section>

        <section class="grid-container">
            <div class="card">
                <img src="wwr/images/client.jpg" alt="Our Mission">
                <h2>Our Mission</h2>
                <p>Bringing nature closer to you through safe and fun adventures in the water.</p>
            </div>
            <div class="card">
                <img src="wwr/images/trip1.jpg" alt="Quality Gear">
                <h2>Quality Gear</h2>
                <p>We use top-of-the-line equipment for your safety and maximum comfort.</p>
            </div>
        </section>

        <section class="newsletter">
            <h2>Join Our Newsletter!</h2>
            <form>
                <label for="user-name">Name:</label>
                <input type="text" id="user-name" name="user-name" required>
                <label for="user-email">Email:</label>
                <input type="email" id="user-email" name="user-email" required>
                <button type="submit">Join the Adventure</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas</p>
        <nav class="social-links">
            <a href="#"><img src="wwr/images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="wwr/images/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="wwr/images/linkedin.png" alt="LinkedIn"></a>
        </nav>
    </footer>
</body>
</html>
